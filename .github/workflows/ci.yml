name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        # Use `npm install` instead of `npm ci` because package-lock.json
        # is regenerated on macOS (the primary dev platform) and lacks the
        # optional linux-x64 native binaries (@esbuild/linux-x64-gnu,
        # @rollup/rollup-linux-x64-gnu, @tailwindcss/oxide-linux-x64-gnu,
        # etc.) that `npm ci` strictly requires on this Ubuntu runner.
        # `npm install` resolves missing optional platform deps without failing.
        run: npm install

      - name: Build
        run: npm run build

      - name: Bundle sanity — brand colors present as hex strings
        # Guards against mm-design exporting objects instead of hex strings,
        # which causes style={{ backgroundColor: colors.blue }} to silently break.
        # Searches ALL JS chunks (not just index-*.js) because code splitting
        # moves design tokens into vendor chunks.
        run: |
          echo "Checking all JS chunks in dist/assets/"
          for COLOR in "0047ba" "cf3339" "f1c22f" "427c42" "ffffff" "111111"; do
            if grep -ql "$COLOR" dist/assets/*.js; then
              echo "✓ #$COLOR found"
            else
              echo "✗ #$COLOR NOT found in any bundle chunk — design token may be broken"
              exit 1
            fi
          done

  test-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        # Use `npm install` instead of `npm ci` — see Build & lint job above
        # for the full rationale (macOS lockfile / linux-x64 optional deps).
        run: npm install

      - name: Run tests
        run: npm test -- --run

  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt pytest pytest-asyncio httpx

      - name: Run backend tests
        run: |
          cd api
          python -m pytest tests/ -v
        continue-on-error: false
