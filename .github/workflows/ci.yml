name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bundle sanity — brand colors present as hex strings
        # Guards against mm-design exporting objects instead of hex strings,
        # which causes style={{ backgroundColor: colors.blue }} to silently break.
        run: |
          JS=$(ls dist/assets/index-*.js | head -1)
          echo "Checking bundle: $JS"
          for COLOR in "0047ba" "cf3339" "f1c22f" "427c42" "ffffff" "111111"; do
            if grep -q "$COLOR" "$JS"; then
              echo "✓ #$COLOR found"
            else
              echo "✗ #$COLOR NOT found in bundle — design token may be broken"
              exit 1
            fi
          done

  test-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt pytest pytest-asyncio httpx

      - name: Run backend tests
        run: |
          cd api
          python -m pytest tests/ -v
        # Will report 'no tests found' until tests are added — not a failure
        continue-on-error: false
