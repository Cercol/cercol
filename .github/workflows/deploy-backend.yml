name: Deploy backend

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and restart on Hetzner
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 188.245.60.20
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /home/cercol/api
            git pull origin main

            # Install the Caddy snippet under /etc/caddy/conf.d/. Idempotent:
            # only copy + validate + reload when the source has actually
            # changed. On validate failure, roll back the snippet so Caddy
            # keeps serving the previous configuration.
            mkdir -p /etc/caddy/conf.d
            if ! cmp -s api/deploy/caddy/cercol-api.caddy /etc/caddy/conf.d/cercol-api.caddy 2>/dev/null; then
                install -m 0644 api/deploy/caddy/cercol-api.caddy /etc/caddy/conf.d/cercol-api.caddy
                if ! caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile; then
                    echo "Caddy validation failed, rolling back snippet" >&2
                    rm -f /etc/caddy/conf.d/cercol-api.caddy
                    exit 1
                fi
                systemctl reload caddy
            fi

            systemctl restart cercol-api
            systemctl is-active cercol-api

            # External smoke test. Probes the public URL through Caddy, so
            # it catches the failure mode where the snippet was installed
            # but topquaranta's Caddyfile no longer imports conf.d.
            #
            # The window is generous on purpose. After `systemctl restart`
            # uvicorn has to boot two workers, and the VPS is shared with
            # topquaranta under sustained high load: a 2026-05-28 deploy saw
            # the app take ~31s to serve its first 200 while the old 10s
            # window (5 x 2s) had already given up and failed the job, even
            # though the deploy itself was healthy. 20 x 3s = up to 60s
            # tolerates that cold start without masking a real outage.
            for i in $(seq 1 20); do
                if curl -fsS -o /dev/null https://api.cercol.team/blog; then
                    echo "External smoke test passed on attempt $i"
                    exit 0
                fi
                sleep 3
            done
            echo "External smoke test failed: https://api.cercol.team/blog unreachable after 60s" >&2
            exit 1
