name: Deploy frontend

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.env.production'
      - 'scripts/**'        # Build scripts (prerender, sitemap) affect output

permissions:
  contents: write

jobs:
  test:
    name: Frontend tests (deploy gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        # Use `npm install` instead of `npm ci` because package-lock.json
        # is regenerated on macOS (the primary dev platform) and lacks the
        # optional linux-x64 native binaries (@rollup/rollup-linux-x64-gnu,
        # @tailwindcss/oxide-linux-x64-gnu, etc.) that `npm ci` strictly
        # requires on this Ubuntu runner (npm/cli optional-deps bug).
        # `npm install` resolves missing optional platform deps without failing.
        run: npm install

      - name: Run tests
        run: npm test -- --run

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # The prerender step (puppeteer over ~650 routes) has historically
    # taken 16 to 22 minutes; 35 leaves headroom without letting a hang
    # burn the 6-hour default.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          # gh-pages needs full history to push correctly
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        # `npm install`, not `npm ci`: see the test job above.
        run: npm install

      - name: Build + prerender
        run: npm run build:full
        # VITE_API_URL is read from .env.production (committed, non-secret).
        # build:full = vite build + scripts/prerender.mjs (puppeteer-core).
        # ubuntu-latest includes Chromium; CHROME_PATH points to it.
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
