<!DOCTYPE html>
<html>
<head>
  <script>
    const path = window.location.pathname
    const search = window.location.search
    const hash = window.location.hash
    // Skip /auth/callback — Supabase handles its own redirect
    if (path.indexOf('/auth/callback') === 0) {
      // do nothing; let AuthCallbackPage mount normally
    } else {
      window.location.replace(
        '/?p=' + encodeURIComponent(path + search) + hash
      )
    }
  </script>
</head>
</html>
